<script>
const imagenes=[
'./assets/images/fondo-slasher-1.jpg',
'./assets/images/fondo-slasher-2.jpg',
'./assets/images/fondo-slasher-3.jpg',
'./assets/images/fondo-slasher-4.jpg'
];
const hero=document.getElementById('hero');
hero.style.position='relative';
const fade=document.createElement('div');
Object.assign(fade.style,{
 position:'absolute',inset:'0',background:'#000',
 opacity:'0',transition:'opacity .6s ease',pointerEvents:'none',zIndex:'1'
});
hero.appendChild(fade);
hero.querySelector('.container').style.position='relative';
hero.querySelector('.container').style.zIndex='2';
let i=0;
setInterval(()=>{
 fade.style.opacity='1';
 setTimeout(()=>{
   i=(i+1)%imagenes.length;
   hero.style.backgroundImage=`url('${imagenes[i]}')`;
   fade.style.opacity='0';
 },600);
},5000);
</script>
